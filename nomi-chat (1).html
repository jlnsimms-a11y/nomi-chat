<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nomi · Your AI Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #141416;
    --surface2: #1c1c20;
    --border: rgba(255,255,255,0.07);
    --accent: #c9a96e;
    --accent-dim: rgba(201,169,110,0.15);
    --accent-glow: rgba(201,169,110,0.06);
    --text: #e8e4dc;
    --text-dim: rgba(232,228,220,0.45);
    --text-muted: rgba(232,228,220,0.25);
    --nomi-bubble: #1a1a1e;
    --user-bubble: rgba(201,169,110,0.12);
    --radius: 2px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: 13px;
    line-height: 1.7;
    overflow: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(201,169,110,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 90%, rgba(201,169,110,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    max-width: 720px;
    margin: 0 auto;
  }

  /* Header */
  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(13,13,15,0.9), transparent);
    backdrop-filter: blur(12px);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .avatar-ring {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }

  .avatar-ring::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 1px solid rgba(201,169,110,0.2);
    animation: pulse-ring 3s ease-in-out infinite;
  }

  @keyframes pulse-ring {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.05); }
  }

  .avatar-initial {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--accent);
    font-style: italic;
  }

  .nomi-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    font-size: 11px;
    letter-spacing: 0.08em;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4caf7d;
    box-shadow: 0 0 6px rgba(76,175,125,0.6);
    animation: breathe 2s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .settings-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    padding: 6px 12px;
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }

  .settings-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Setup panel */
  .setup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13,13,15,0.95);
    backdrop-filter: blur(16px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease;
  }

  .setup-overlay.hidden { display: none; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .setup-card {
    width: 420px;
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 40px;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .setup-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    margin-bottom: 6px;
  }

  .setup-subtitle {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.06em;
    margin-bottom: 32px;
  }

  .field {
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
  }

  .field input::placeholder {
    color: var(--text-muted);
  }

  .setup-actions {
    display: flex;
    gap: 10px;
    margin-top: 28px;
  }

  .btn-primary {
    flex: 1;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    padding: 11px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: var(--radius);
    transition: opacity 0.2s;
    text-transform: uppercase;
  }

  .btn-primary:hover { opacity: 0.85; }

  .btn-secondary {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 11px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.2s;
  }

  .btn-secondary:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  .hint {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  .hint a {
    color: var(--accent);
    text-decoration: none;
  }

  /* Messages */
  .messages {
    overflow-y: auto;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); }

  .message {
    display: flex;
    gap: 12px;
    animation: msgIn 0.25s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    color: var(--text-muted);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.user .msg-avatar {
    border-color: rgba(201,169,110,0.3);
    color: var(--accent);
  }

  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.65;
    font-size: 13px;
  }

  .message.nomi .bubble {
    background: var(--nomi-bubble);
    border: 1px solid var(--border);
    color: var(--text);
    border-top-left-radius: 0;
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(201,169,110,0.2);
    color: var(--text);
    border-top-right-radius: 0;
    text-align: right;
  }

  .msg-time {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  .message.user .msg-time {
    text-align: right;
  }

  /* Typing indicator */
  .typing-indicator {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 0 32px;
    margin-bottom: 8px;
  }

  .typing-indicator.visible { display: flex; }

  .typing-dots {
    display: flex;
    gap: 4px;
    padding: 10px 14px;
    background: var(--nomi-bubble);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-top-left-radius: 0;
  }

  .typing-dots span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.4;
    animation: typingDot 1.2s ease-in-out infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingDot {
    0%, 80%, 100% { opacity: 0.2; transform: scale(1); }
    40% { opacity: 1; transform: scale(1.3); }
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-muted);
    text-align: center;
    padding: 40px;
  }

  .empty-state .big-initial {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px;
    font-weight: 300;
    font-style: italic;
    color: rgba(201,169,110,0.15);
    line-height: 1;
    margin-bottom: 8px;
  }

  .empty-state p {
    font-size: 12px;
    letter-spacing: 0.04em;
  }

  /* Input area */
  .input-area {
    padding: 16px 32px 28px;
    border-top: 1px solid var(--border);
    background: linear-gradient(to top, var(--bg) 60%, transparent);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 4px 4px 16px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: rgba(201,169,110,0.4);
  }

  textarea {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 300;
    line-height: 1.6;
    resize: none;
    outline: none;
    min-height: 22px;
    max-height: 120px;
    padding: 8px 0;
  }

  textarea::placeholder {
    color: var(--text-muted);
  }

  .send-btn {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    align-self: flex-end;
    margin-bottom: 2px;
    transition: opacity 0.2s, transform 0.15s;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .send-btn svg {
    width: 14px;
    height: 14px;
    fill: #0d0d0f;
  }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding: 0 2px;
  }

  .char-hint {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .key-hint {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* Error toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #2a1515;
    border: 1px solid rgba(220,80,80,0.3);
    color: #e88;
    padding: 10px 20px;
    font-size: 12px;
    letter-spacing: 0.04em;
    border-radius: var(--radius);
    transition: transform 0.3s ease;
    z-index: 200;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* No config banner */
  .no-config {
    text-align: center;
    padding: 16px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--border);
  }

  .no-config span {
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
</style>
</head>
<body>

<div class="setup-overlay" id="setupOverlay">
  <div class="setup-card">
    <div class="setup-title">Connect your Nomi</div>
    <div class="setup-subtitle">Your keys stay in your browser — nothing is stored externally.</div>

    <div class="field">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
      <div class="hint">Found in Nomi app → <strong>Profile → Integrations</strong></div>
    </div>

    <div class="field">
      <label>Nomi UUID</label>
      <input type="text" id="nomiUUID" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
      <div class="hint">Get it via <code>GET /v1/nomis</code> or <a href="https://api.nomi.ai/docs/" target="_blank">api.nomi.ai/docs</a></div>
    </div>

    <div class="field">
      <label>Nomi's Name</label>
      <input type="text" id="nomiName" placeholder="e.g. Luna">
    </div>

    <div class="setup-actions">
      <button class="btn-primary" onclick="saveConfig()">Connect</button>
      <button class="btn-secondary" onclick="closeSetup()">Cancel</button>
    </div>
  </div>
</div>

<div class="app">
  <header>
    <div class="header-left">
      <div class="avatar-ring">
        <span class="avatar-initial" id="avatarInitial">N</span>
      </div>
      <div>
        <div class="nomi-name" id="nomiNameDisplay">Nomi</div>
        <div class="status-dot">
          <span class="dot"></span>
          <span>present</span>
        </div>
      </div>
    </div>
    <button class="settings-btn" onclick="openSetup()">⚙ configure</button>
  </header>

  <div id="noConfigBanner" class="no-config" style="display:none">
    No connection yet. <span onclick="openSetup()">Add your API key to get started.</span>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="big-initial" id="emptyInitial">N</div>
      <p>Say something.</p>
    </div>
  </div>

  <div class="typing-indicator" id="typingIndicator">
    <div style="width:28px"></div>
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea 
        id="msgInput" 
        placeholder="Write a message…" 
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="char-hint" id="charHint"></span>
      <span class="key-hint">↵ send · shift+↵ newline</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // State
  let config = {
    apiKey: localStorage.getItem('nomi_api_key') || '',
    nomiUUID: localStorage.getItem('nomi_uuid') || '',
    nomiName: localStorage.getItem('nomi_name') || 'Nomi'
  };

  let sending = false;

  // Init
  function init() {
    applyConfig();
    if (!config.apiKey || !config.nomiUUID) {
      document.getElementById('setupOverlay').classList.remove('hidden');
      document.getElementById('noConfigBanner').style.display = 'block';
    }
  }

  function applyConfig() {
    const name = config.nomiName || 'Nomi';
    const initial = name.charAt(0).toUpperCase();
    document.getElementById('nomiNameDisplay').textContent = name;
    document.getElementById('avatarInitial').textContent = initial;
    document.getElementById('emptyInitial').textContent = initial;
  }

  // Setup
  function openSetup() {
    document.getElementById('apiKey').value = config.apiKey;
    document.getElementById('nomiUUID').value = config.nomiUUID;
    document.getElementById('nomiName').value = config.nomiName;
    document.getElementById('setupOverlay').classList.remove('hidden');
  }

  function closeSetup() {
    if (!config.apiKey || !config.nomiUUID) return;
    document.getElementById('setupOverlay').classList.add('hidden');
  }

  function saveConfig() {
    const key = document.getElementById('apiKey').value.trim();
    const uuid = document.getElementById('nomiUUID').value.trim();
    const name = document.getElementById('nomiName').value.trim() || 'Nomi';

    if (!key || !uuid) {
      showToast('API key and Nomi UUID are required.');
      return;
    }

    config = { apiKey: key, nomiUUID: uuid, nomiName: name };
    localStorage.setItem('nomi_api_key', key);
    localStorage.setItem('nomi_uuid', uuid);
    localStorage.setItem('nomi_name', name);

    applyConfig();
    document.getElementById('setupOverlay').classList.add('hidden');
    document.getElementById('noConfigBanner').style.display = 'none';
  }

  // Messaging
  async function sendMessage() {
    if (sending) return;
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;

    if (!config.apiKey || !config.nomiUUID) {
      openSetup();
      return;
    }

    // Clear input
    input.value = '';
    autoResize(input);
    document.getElementById('charHint').textContent = '';

    // Add user bubble
    addMessage('user', text);
    hideEmpty();

    // Show typing
    sending = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping(true);

    try {
      const response = await fetch(`https://api.nomi.ai/v1/nomis/${config.nomiUUID}/chat`, {
        method: 'POST',
        headers: {
          'Authorization': config.apiKey,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ messageText: text })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.message || `Error ${response.status}`);
      }

      const data = await response.json();
      const reply = data?.reply?.text || data?.text || JSON.stringify(data);
      showTyping(false);
      addMessage('nomi', reply);

    } catch (err) {
      showTyping(false);
      showToast(err.message || 'Something went wrong. Check your API key and UUID.');
    } finally {
      sending = false;
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }
  }

  function addMessage(role, text) {
    const container = document.getElementById('messages');
    const name = role === 'nomi' ? (config.nomiName || 'Nomi') : 'You';
    const initial = name.charAt(0).toUpperCase();
    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="msg-avatar">${initial}</div>
      <div>
        <div class="bubble">${escapeHtml(text)}</div>
        <div class="msg-time">${now}</div>
      </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function hideEmpty() {
    const el = document.getElementById('emptyState');
    if (el) el.remove();
  }

  function showTyping(visible) {
    const el = document.getElementById('typingIndicator');
    el.classList.toggle('visible', visible);
    if (visible) {
      const msgs = document.getElementById('messages');
      msgs.scrollTop = msgs.scrollHeight;
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    const len = el.value.length;
    document.getElementById('charHint').textContent = len > 0 ? `${len} chars` : '';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }

  init();
</script>
</body>
</html>
